<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PA Notary — Notarizza documento</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; margin: 24px; max-width: 900px; }
    .row { display: flex; gap: 16px; flex-wrap: wrap; }
    label { display:block; font-weight:600; margin: 12px 0 6px; }
    input, textarea, select { width: 100%; padding: 10px; font-size: 14px; }
    textarea { min-height: 90px; }
    button { padding: 10px 14px; font-size: 14px; cursor: pointer; }
    pre { background:#111; color:#eee; padding: 12px; overflow:auto; border-radius: 8px; }
    .card { border:1px solid #ddd; border-radius: 10px; padding: 14px; }
    .ok { color: #0a7a2f; font-weight: 600; }
    .err { color: #b00020; font-weight: 600; }
    .muted { color:#666; font-size: 12px; }
  </style>
</head>

<body>
  <h1>Notarizza un documento nel MerkleLog</h1>

  <div class="card">
    <label>Documento</label>
    <input id="file" type="file" />

    <div class="row">
      <div style="flex:1; min-width:280px;">
        <label>issuer.entity_id</label>
        <input id="issuerId" placeholder="es: IPA:comune-roma / CF:..." />
      </div>

      <div style="flex:1; min-width:280px;">
        <label>issuer.name (opzionale)</label>
        <input id="issuerName" placeholder="es: Comune di Roma" />
      </div>
    </div>

    <div class="row">
      <div style="flex:1; min-width:280px;">
        <label>doc_uid</label>
        <input id="docUid" placeholder="es: PROT/2026/123456" />
      </div>

      <div style="flex:1; min-width:280px;">
        <label>event_type</label>
        <select id="eventType">
          <option value="CREATE">CREATE</option>
          <option value="UPDATE">UPDATE</option>
          <option value="REVOKE">REVOKE</option>
          <option value="EXPIRE">EXPIRE</option>
        </select>
      </div>
    </div>

    <div class="row">
      <div style="flex:1; min-width:280px;">
        <label>doc_version</label>
        <input id="docVersion" type="number" min="1" value="1" />
      </div>

      <div style="flex:1; min-width:280px;">
        <label>prev_event_id (richiesto per UPDATE/REVOKE/EXPIRE)</label>
        <input id="prevEventId" placeholder="UUIDv4 della catena precedente" />
      </div>
    </div>

    <label>title</label>
    <input id="title" placeholder="Titolo breve (UI)" />

    <label>description (opzionale)</label>
    <textarea id="description" placeholder="1–3 frasi"></textarea>

    <label>notes (opzionale)</label>
    <textarea id="notes" placeholder="note libere"></textarea>

    <div style="margin-top:12px;" class="row">
      <button id="btnBuild">1) Genera JSON</button>
      <button id="btnSend" disabled>2) Invia a /add</button>
      <button id="btnDownload" disabled>Scarica JSON</button>
    </div>

    <p class="muted">
      L’evento includerà payload_hash sha-256 hex del file. recorded_at verrà settato “ora”, issued_at = “ora” (puoi adattarlo).
      Limite: JSON ≤ 2KB (UTF-8).
    </p>

    <div id="status"></div>
  </div>

  <h2>JSON canonicalizzato (compatto)</h2>
  <pre id="out">(vuoto)</pre>

  <h2>Risposta server</h2>
  <pre id="resp">(vuoto)</pre>

  <script type="module" src="./index.js"></script>
</body>
</html>
