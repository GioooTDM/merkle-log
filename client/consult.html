<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PA Notary — Consultazione Registro</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .filter-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 15px 20px; margin-bottom: 20px; }
    .form-group { display: flex; flex-direction: column; }
    .form-group label { font-size: 0.85rem; font-weight: bold; color: #555; margin-bottom: 5px; }
    .form-control { padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem; }

    .table-responsive { overflow-x: auto; margin-top: 15px; }
    .registry-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    .registry-table th, .registry-table td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; }
    .registry-table th { background-color: #f8f9fa; color: #333; font-weight: 600; white-space: nowrap; }
    .registry-table tr:hover { background-color: #fcfcfc; }

    .badge-version { background: #e3f2fd; color: #0d47a1; padding: 3px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; }
    .badge-index { font-family: monospace; background: #eee; padding: 3px 6px; border-radius: 4px; color: #555; }

    .action-link { color: var(--primary); text-decoration: none; font-weight: bold; font-size: 0.85rem; }
    .action-link:hover { text-decoration: underline; }
    .pagination-bar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-top: 16px; }
    .pagination-info { font-size: 0.85rem; color: var(--muted); }
    .pagination-actions { display: flex; gap: 10px; }
  </style>
</head>

<body>
  <main class="container" style="max-width: 900px;">
    <header>
      <h1>Consultazione <span class="badge">Registro Pubblico</span></h1>
      <p class="subtitle">Esplora la timeline degli eventi o cerca uno specifico documento notarizzato</p>
    </header>

    <section class="card">
      <h3>Parametri di Ricerca</h3>
      <div class="filter-grid">
        <div class="form-group">
          <label for="filterIssuer">Ente Emittente</label>
          <select id="filterIssuer" class="form-control"></select>
        </div>
        <div class="form-group">
          <label for="filterUid">ID Documento</label>
          <input type="text" id="filterUid" class="form-control" placeholder="Es. CERTIFICATO/2026/2150">
        </div>
        <div class="form-group">
          <label for="filterDateFrom">Data Inizio</label>
          <input type="date" id="filterDateFrom" class="form-control">
        </div>
        <div class="form-group">
          <label for="filterDateTo">Data Fine</label>
          <input type="date" id="filterDateTo" class="form-control">
        </div>
      </div>
      <div style="text-align: right;">
        <button class="btn" id="btnClearFilters" style="padding: 8px 16px; margin-right: 10px;">Cancella Filtri</button>
        <button class="btn" id="btnSearch" style="padding: 8px 20px;">Applica Filtri</button>
      </div>
    </section>

    <section class="card">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <h3>Risultati</h3>
        <span class="muted" style="font-size: 0.85rem;" id="resultCount">Caricamento ultimi eventi notarizzati...</span>
      </div>

      <div class="table-responsive">
        <table class="registry-table">
          <thead>
            <tr>
              <th>Index</th>
              <th>Data</th>
              <th>Ente</th>
              <th>Documento</th>
              <th>Versione</th>
              <th>Azione</th>
            </tr>
          </thead>
          <tbody id="resultsBody">
            <tr>
              <td colspan="6" style="text-align:center; padding: 20px; color: #777;">
                Caricamento in corso...
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="pagination-bar" id="paginationBar" hidden>
        <span class="pagination-info" id="paginationInfo">Pagina 1 di 1</span>
        <div class="pagination-actions">
          <button class="btn" id="btnPrevPage" type="button">Precedente</button>
          <button class="btn" id="btnNextPage" type="button">Successiva</button>
        </div>
      </div>
    </section>

    <nav style="margin-top: 30px; text-align: center;">
      <a href="index.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">← Torna alla Dashboard</a>
    </nav>
  </main>

  <script type="module">
    import {
      API_BASE,
      DEMO_ISSUERS,
      el,
      safeStr,
      normalizeHex,
      formatDate,
      fetchJson,
    } from "./common.js";

    const Config = {
      PAGE_SIZE: 10
    };

    const DOM = {
      btnClearFilters: el('btnClearFilters'),
      btnSearch: el('btnSearch'),
      resultsBody: el('resultsBody'),
      resultCount: el('resultCount'),
      paginationBar: el('paginationBar'),
      paginationInfo: el('paginationInfo'),
      btnPrevPage: el('btnPrevPage'),
      btnNextPage: el('btnNextPage'),
      filterIssuerSelect: el('filterIssuer'),
      filterUidInput: el('filterUid'),
      filterDateFromInput: el('filterDateFrom'),
      filterDateToInput: el('filterDateTo')
    };

    const State = {
      currentPage: 1,
      totalCount: 0,
      lastMode: "latest",
      lastQuery: null
    };

    const Utils = {
      parseIssuer(issuerObj) {
        if (!issuerObj) return "-";
        if (issuerObj.name) return String(issuerObj.name);
        if (issuerObj.entity_id) return String(issuerObj.entity_id);
        return "-";
      },

      parseEntryMaybe(e) {
        if (typeof e === "string") {
          try { return JSON.parse(e); } catch { return null; }
        }
        return e;
      }
    };

    const API = {
      withPagingParams(qs, page, pageSize) {
        qs.set("order", "desc");
        qs.set("limit", String(pageSize));
        qs.set("offset", String((page - 1) * pageSize));
        return qs;
      },

      async searchEntries({ docID, issuerEntityID, dateFrom, dateTo, page, pageSize }) {
        const qs = new URLSearchParams();
        if (docID) qs.set("doc_id", docID);
        if (issuerEntityID) qs.set("issuer_entity_id", issuerEntityID);
        if (dateFrom) qs.set("date_from", dateFrom);
        if (dateTo) qs.set("date_to", dateTo);
        this.withPagingParams(qs, page, pageSize);
        const url = `${API_BASE}/entries?${qs.toString()}`;
        return fetchJson(url);
      }
    };

    const App = {
      init() {
        this.renderIssuerOptions();
        this.bindEvents();
        this.loadInitialEvents();
      },

      renderIssuerOptions() {
        DOM.filterIssuerSelect.innerHTML = "";
        DEMO_ISSUERS.forEach((issuer) => {
          const option = document.createElement("option");
          option.value = issuer.entityId;
          option.textContent = issuer.name;
          DOM.filterIssuerSelect.appendChild(option);
        });
      },

      bindEvents() {
        DOM.btnSearch.addEventListener('click', () => this.handleSearch());
        DOM.btnClearFilters.addEventListener('click', () => this.clearFilters());
        DOM.btnPrevPage.addEventListener('click', () => this.changePage(-1));
        DOM.btnNextPage.addEventListener('click', () => this.changePage(1));
        DOM.filterUidInput.addEventListener('keydown', (e) => {
          if (e.key === "Enter") this.handleSearch();
        });
      },

      clearFilters() {
        DOM.filterIssuerSelect.selectedIndex = 0;
        DOM.filterUidInput.value = "";
        DOM.filterDateFromInput.value = "";
        DOM.filterDateToInput.value = "";
        this.loadInitialEvents(1);
      },

      rowFromEvent(ev, index, fallbackDocId = "") {
        return {
          index,
          date: formatDate(ev.recorded_at || ev.issued_at),
          dateRaw: safeStr(ev.recorded_at || ev.issued_at, ""),
          issuerEntityID: safeStr(ev?.issuer?.entity_id, ""),
          issuer: Utils.parseIssuer(ev.issuer),
          docId: safeStr(ev.doc_id || fallbackDocId),
          version: safeStr(ev.doc_version, "?"),
          title: safeStr(ev.title || ev.event_type || "Evento"),
          event_id: safeStr(ev.event_id),
          event_type: safeStr(ev.event_type),
          payload_hash: normalizeHex(ev?.payload_hash?.value),
        };
      },

      rowsFromApiResponse(apiResp) {
        const docId = apiResp?.doc_id;
        const idxs = Array.isArray(apiResp?.indexes) ? apiResp.indexes : [];
        const entries = Array.isArray(apiResp?.entries) ? apiResp.entries : [];

        const parsed = entries.map(Utils.parseEntryMaybe).filter(Boolean);

        const rows = [];
        for (let i = 0; i < Math.min(idxs.length, parsed.length); i++) {
          const ev = parsed[i];
          rows.push(this.rowFromEvent(ev, idxs[i], docId));
        }
        return rows;
      },

      renderTable(rows, totalCount = rows.length) {
        DOM.resultsBody.innerHTML = "";

        if (!rows || rows.length === 0) {
          DOM.resultsBody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding: 20px; color: #777;">Nessun documento trovato con i filtri selezionati.</td></tr>`;
          DOM.resultCount.innerText = "0 risultati";
          this.renderPagination(0);
          return;
        }

        rows.forEach(item => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td><span class="badge-index">${item.index}</span></td>
            <td style="white-space: nowrap;">${item.date}</td>
            <td>${item.issuer}</td>
            <td>
              <strong>${item.title}</strong><br>
              <span class="muted" style="font-size: 0.75rem;">ID: ${item.docId}</span>
            </td>
            <td><span class="badge-version">v${item.version}</span></td>
            <td><a href="details.html?index=${item.index}" class="action-link">Dettagli →</a></td>
          `;
          DOM.resultsBody.appendChild(tr);
        });

        const start = ((State.currentPage - 1) * Config.PAGE_SIZE) + 1;
        const end = start + rows.length - 1;
        DOM.resultCount.innerText = `Mostrando ${start}-${end} di ${totalCount} risultati`;
        this.renderPagination(totalCount);
      },

      renderPagination(totalCount) {
        State.totalCount = totalCount;
        const totalPages = totalCount > 0 ? Math.ceil(totalCount / Config.PAGE_SIZE) : 0;
        const hasPages = totalPages > 1;

        DOM.paginationBar.hidden = !hasPages;
        if (!hasPages) {
          DOM.paginationInfo.textContent = "Pagina 1 di 1";
          DOM.btnPrevPage.disabled = true;
          DOM.btnNextPage.disabled = true;
          return;
        }

        DOM.paginationInfo.textContent = `Pagina ${State.currentPage} di ${totalPages}`;
        DOM.btnPrevPage.disabled = State.currentPage <= 1;
        DOM.btnNextPage.disabled = State.currentPage >= totalPages;
      },

      setSearchLoading(isLoading) {
        DOM.btnSearch.innerText = isLoading ? "Ricerca in corso..." : "Applica Filtri";
        DOM.btnSearch.disabled = isLoading;
      },

      getCurrentFilters() {
        return {
          issuerEntityID: DOM.filterIssuerSelect.value.trim(),
          docID: DOM.filterUidInput.value.trim(),
          dateFrom: DOM.filterDateFromInput.value.trim(),
          dateTo: DOM.filterDateToInput.value.trim(),
        };
      },

      async fetchSearchPage(page = 1) {
        const { issuerEntityID, docID, dateFrom, dateTo } = State.lastQuery;
        return API.searchEntries({
          docID,
          issuerEntityID,
          dateFrom,
          dateTo,
          page,
          pageSize: Config.PAGE_SIZE,
        });
      },

      showTableError(prefix, err) {
        DOM.resultsBody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding: 20px; color: #b00020;">
          ${prefix}: ${safeStr(err?.message, "richiesta fallita")}
        </td></tr>`;
        DOM.resultCount.innerText = "Errore";
        this.renderPagination(0);
      },

      async handleSearch(page = 1) {
        const { issuerEntityID, docID, dateFrom, dateTo } = this.getCurrentFilters();

        if (!issuerEntityID && !docID && !dateFrom && !dateTo) {
          State.lastMode = "latest";
          State.lastQuery = { issuerEntityID: "", docID: "", dateFrom: "", dateTo: "" };
          State.currentPage = page;
          await this.loadInitialEvents(page);
          return;
        }

        State.lastMode = "search";
        State.lastQuery = { issuerEntityID, docID, dateFrom, dateTo };
        State.currentPage = page;
        this.setSearchLoading(true);

        try {
          const resp = await this.fetchSearchPage(page);
          const rows = this.rowsFromApiResponse(resp);
          const totalCount = Number(resp?.total_count ?? rows.length);
          this.renderTable(rows, totalCount);
        } catch (err) {
          console.error(err);
          this.showTableError("Errore", err);
        } finally {
          this.setSearchLoading(false);
        }
      },

      async changePage(delta) {
        const nextPage = State.currentPage + delta;
        const totalPages = State.totalCount > 0 ? Math.ceil(State.totalCount / Config.PAGE_SIZE) : 1;
        if (nextPage < 1 || nextPage > totalPages) return;
        if ((State.lastMode === "search" || State.lastMode === "latest") && State.lastQuery) {
          await this.handleSearch(nextPage);
          return;
        }
      },

      async loadInitialEvents(page = 1) {
        try {
          State.lastMode = "latest";
          State.lastQuery = { issuerEntityID: "", docID: "", dateFrom: "", dateTo: "" };
          State.currentPage = page;
          DOM.resultCount.innerText = "Caricamento eventi notarizzati...";
          const resp = await this.fetchSearchPage(page);
          const rows = this.rowsFromApiResponse(resp);
          const totalCount = Number(resp?.total_count ?? rows.length);
          this.renderTable(rows, totalCount);
          if (totalCount === 0) {
            DOM.resultCount.innerText = "Nessun evento notarizzato disponibile";
          }
        } catch (err) {
          console.error(err);
          this.showTableError("Errore caricamento iniziale", err);
        }
      }
    };

    App.init();
  </script>
</body>
</html>
