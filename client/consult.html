<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PA Notary — Consultazione Registro</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .form-group { display: flex; flex-direction: column; }
    .form-group label { font-size: 0.85rem; font-weight: bold; color: #555; margin-bottom: 5px; }
    .form-control { padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem; }

    .table-responsive { overflow-x: auto; margin-top: 15px; }
    .registry-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    .registry-table th, .registry-table td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; }
    .registry-table th { background-color: #f8f9fa; color: #333; font-weight: 600; white-space: nowrap; }
    .registry-table tr:hover { background-color: #fcfcfc; }

    .badge-version { background: #e3f2fd; color: #0d47a1; padding: 3px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; }
    .badge-index { font-family: monospace; background: #eee; padding: 3px 6px; border-radius: 4px; color: #555; }

    .action-link { color: var(--primary); text-decoration: none; font-weight: bold; font-size: 0.85rem; }
    .action-link:hover { text-decoration: underline; }
  </style>
</head>

<body>
  <main class="container" style="max-width: 900px;">
    <header>
      <h1>Consultazione <span class="badge">Registro Pubblico</span></h1>
      <p class="subtitle">Esplora la timeline degli eventi o cerca uno specifico documento notarizzato</p>
    </header>

    <section class="card">
      <h3>Parametri di Ricerca</h3>
      <div class="filter-grid">

        <div class="form-group">
          <label for="filterIssuer">Ente Emittente</label>
          <select id="filterIssuer" class="form-control">
            <option value="">Tutti gli Enti</option>
            <option value="IPA:c_torino">Comune di Torino</option>
            <option value="IPA:r_piemonte">Regione Piemonte</option>
            <option value="IPA:m_interno">Ministero dell'Interno</option>
          </select>
        </div>

        <div class="form-group">
          <label for="filterUid">ID Documento (UID)</label>
          <input type="text" id="filterUid" class="form-control" placeholder="Es. CERTIFICATO/2026/2150">
        </div>

        <div class="form-group">
          <label for="filterDateFrom">Data Inizio</label>
          <input type="date" id="filterDateFrom" class="form-control">
        </div>
        <div class="form-group">
          <label for="filterDateTo">Data Fine</label>
          <input type="date" id="filterDateTo" class="form-control">
        </div>

      </div>
      <div style="text-align: right;">
        <button class="btn" id="btnSearch" style="padding: 8px 20px;">Applica Filtri</button>
      </div>
    </section>

    <section class="card">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <h3>Risultati</h3>
        <span class="muted" style="font-size: 0.85rem;" id="resultCount">Inserisci un doc_uid e premi “Applica Filtri”</span>
      </div>

      <div class="table-responsive">
        <table class="registry-table">
          <thead>
            <tr>
              <th>Index</th>
              <th>Data</th>
              <th>Ente</th>
              <th>Documento</th>
              <th>Versione</th>
              <th>Azione</th>
            </tr>
          </thead>
          <tbody id="resultsBody">
            <tr>
              <td colspan="6" style="text-align:center; padding: 20px; color: #777;">
                Nessuna ricerca eseguita.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <nav style="margin-top: 30px; text-align: center;">
      <a href="index.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">← Torna alla Dashboard</a>
    </nav>
  </main>

  <script>
    const Config = {
      API_BASE: "http://localhost:2025",
      INITIAL_LATEST_LIMIT: 5
    };

    const DOM = {
      btnSearch: document.getElementById('btnSearch'),
      resultsBody: document.getElementById('resultsBody'),
      resultCount: document.getElementById('resultCount'),
      filterUidInput: document.getElementById('filterUid')
    };

    const Utils = {
      safeStr(v, fallback = "-") {
        return (v === undefined || v === null || v === "") ? fallback : String(v);
      },

      normalizeHex(h) {
        return String(h || "").trim().toLowerCase().replace(/^hex:/, "");
      },

      parseIssuer(issuerObj) {
        if (!issuerObj) return "-";
        if (issuerObj.name) return String(issuerObj.name);
        if (issuerObj.entity_id) return String(issuerObj.entity_id);
        return "-";
      },

      formatDate(s) {
        if (!s) return "-";

        const d = new Date(s);
        if (isNaN(d.getTime())) return s; // fallback se formato strano

        const pad = (n) => n.toString().padStart(2, "0");

        const year  = d.getFullYear();
        const month = pad(d.getMonth() + 1);
        const day   = pad(d.getDate());
        const hours = pad(d.getHours());
        const mins  = pad(d.getMinutes());
        const secs  = pad(d.getSeconds());

        return `${year}-${month}-${day} ${hours}:${mins}:${secs}`;
      },

      parseEntryMaybe(e) {
        if (typeof e === "string") {
          try { return JSON.parse(e); } catch { return null; }
        }
        return e;
      }
    };

    const API = {
      async fetchJson(url) {
        const res = await fetch(url);
        if (!res.ok) {
          const t = await res.text().catch(() => "");
          throw new Error(`HTTP ${res.status}: ${t || "Richiesta fallita"}`);
        }
        return res.json();
      },

      async getCheckpointSize() {
        const res = await fetch(`${Config.API_BASE}/checkpoint`, { cache: "no-store" });
        if (!res.ok) {
          const t = await res.text().catch(() => "");
          throw new Error(`HTTP ${res.status}: ${t || "checkpoint non disponibile"}`);
        }
        const text = await res.text();
        const lines = text.split(/\r?\n/).map((s) => s.trim()).filter(Boolean);
        const sizeLine = lines.find((line) => /^\d+$/.test(line));
        if (!sizeLine) throw new Error("Formato checkpoint non riconosciuto");
        return Number(sizeLine);
      },

      async getEntryByIndex(index) {
        const res = await fetch(`${Config.API_BASE}/get-entry/${index}`);
        if (!res.ok) return null;
        const text = await res.text();
        try { return JSON.parse(text); } catch { return null; }
      },

      async searchByDocUID(docUID) {
        const url = `${Config.API_BASE}/get-entries-by-docuid?doc_uid=${encodeURIComponent(docUID)}`;
        return this.fetchJson(url);
      }
    };

    const App = {
      init() {
        this.bindEvents();
        this.loadInitialEvents();
      },

      bindEvents() {
        DOM.btnSearch.addEventListener('click', () => this.handleSearch());
        DOM.filterUidInput.addEventListener('keydown', (e) => {
          if (e.key === "Enter") this.handleSearch();
        });
      },

      rowFromEvent(ev, index, fallbackUID = "") {
        return {
          index,
          date: Utils.formatDate(ev.recorded_at || ev.issued_at),
          issuer: Utils.parseIssuer(ev.issuer),
          uid: Utils.safeStr(ev.doc_uid || fallbackUID),
          version: Utils.safeStr(ev.doc_version, "?"),
          title: Utils.safeStr(ev.title || ev.event_type || "Evento"),
          event_id: Utils.safeStr(ev.event_id),
          event_type: Utils.safeStr(ev.event_type),
          payload_hash: Utils.normalizeHex(ev?.payload_hash?.value),
        };
      },

      sortRowsNewestFirst(rows) {
        rows.sort((a, b) => {
          const av = Number(a.version), bv = Number(b.version);
          const avOk = Number.isFinite(av), bvOk = Number.isFinite(bv);
          if (avOk && bvOk && av !== bv) return bv - av;
          return Number(b.index) - Number(a.index);
        });
      },

      rowsFromApiResponse(apiResp) {
        const uid = apiResp?.doc_uid;
        const idxs = Array.isArray(apiResp?.indexes) ? apiResp.indexes : [];
        const entries = Array.isArray(apiResp?.entries) ? apiResp.entries : [];

        const parsed = entries.map(Utils.parseEntryMaybe).filter(Boolean);

        const rows = [];
        for (let i = 0; i < Math.min(idxs.length, parsed.length); i++) {
          const ev = parsed[i];
          rows.push(this.rowFromEvent(ev, idxs[i], uid));
        }

        this.sortRowsNewestFirst(rows);
        return rows;
      },

      async loadLatestNotarizedEvents(limit = 5) {
        const size = await API.getCheckpointSize();
        if (!Number.isFinite(size) || size <= 0) return [];

        const out = [];
        for (let idx = size - 1; idx >= 0 && out.length < limit; idx--) {
          const ev = await API.getEntryByIndex(idx);
          if (!ev || typeof ev !== "object") continue;
          out.push(this.rowFromEvent(ev, idx));
        }
        return out;
      },

      renderTable(rows) {
        DOM.resultsBody.innerHTML = "";

        if (!rows || rows.length === 0) {
          DOM.resultsBody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding: 20px; color: #777;">Nessun documento trovato per il doc_uid indicato.</td></tr>`;
          DOM.resultCount.innerText = "0 risultati";
          return;
        }

        rows.forEach(item => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td><span class="badge-index">${item.index}</span></td>
            <td style="white-space: nowrap;">${item.date}</td>
            <td>${item.issuer}</td>
            <td>
              <strong>${item.title}</strong><br>
              <span class="muted" style="font-size: 0.75rem;">UID: ${item.uid}</span>
            </td>
            <td><span class="badge-version">v${item.version}</span></td>
            <td><a href="details.html?index=${item.index}" class="action-link">Dettagli →</a></td>
          `;
          DOM.resultsBody.appendChild(tr);
        });

        DOM.resultCount.innerText = `Mostrando ${rows.length} risultati`;
      },

      setSearchLoading(isLoading) {
        DOM.btnSearch.innerText = isLoading ? "Ricerca in corso..." : "Applica Filtri";
        DOM.btnSearch.disabled = isLoading;
      },

      showTableError(prefix, err) {
        DOM.resultsBody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding: 20px; color: #b00020;">
          ${prefix}: ${Utils.safeStr(err?.message, "richiesta fallita")}
        </td></tr>`;
        DOM.resultCount.innerText = "Errore";
      },

      async handleSearch() {
        const docUID = DOM.filterUidInput.value.trim();

        if (!docUID) {
          this.renderTable([]);
          DOM.resultCount.innerText = "Inserisci un doc_uid per cercare";
          return;
        }

        this.setSearchLoading(true);

        try {
          const resp = await API.searchByDocUID(docUID);
          const rows = this.rowsFromApiResponse(resp);
          this.renderTable(rows);
        } catch (err) {
          console.error(err);
          this.showTableError("Errore", err);
        } finally {
          this.setSearchLoading(false);
        }
      },

      async loadInitialEvents() {
        try {
          DOM.resultCount.innerText = "Caricamento ultimi eventi...";
          const rows = await this.loadLatestNotarizedEvents(Config.INITIAL_LATEST_LIMIT);
          this.renderTable(rows);
          DOM.resultCount.innerText = rows.length > 0
            ? `Ultimi ${rows.length} eventi notarizzati`
            : "Nessun evento notarizzato disponibile";
        } catch (err) {
          console.error(err);
          this.showTableError("Errore caricamento iniziale", err);
        }
      }
    };

    App.init();
  </script>
</body>
</html>
