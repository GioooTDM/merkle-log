<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PA Notary — Verifica Consistency Proof</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <header>
      <h1>Consistency Proof <span class="badge">Verification</span></h1>
      <p class="subtitle">Verifica offline che un checkpoint più grande sia consistente con uno precedente</p>
    </header>

    <div class="row">
      <section class="card col">
        <h3>1. Carica Dati</h3>

        <div class="field-group">
          <label for="verifyMode">Modalità Verifica</label>
          <select id="verifyMode">
            <option value="checkpoint">Usa checkpoint (.txt)</option>
            <option value="root">Usa root hash (hex)</option>
          </select>
        </div>

        <div id="checkpointInputs">
          <div class="field-group">
            <label for="oldCheckpoint">Checkpoint precedente (.txt)</label>
            <input id="oldCheckpoint" type="file" />
          </div>

          <div class="field-group">
            <label for="newCheckpoint">Checkpoint successivo (.txt)</label>
            <input id="newCheckpoint" type="file" />
          </div>
        </div>

        <div id="rootInputs" style="display:none;">
          <div class="field-group">
            <label for="oldRootHex">Old Root Hash (hex, 64 chars)</label>
            <input id="oldRootHex" type="text" placeholder="es. abcd... (32 byte hex)" />
          </div>

          <div class="field-group">
            <label for="newRootHex">New Root Hash (hex, 64 chars)</label>
            <input id="newRootHex" type="text" placeholder="es. ef01... (32 byte hex)" />
          </div>
        </div>

        <div class="field-group">
          <label for="consistencyProof">Consistency Proof (.json)</label>
          <input id="consistencyProof" type="file" accept=".json" />
        </div>

        <div class="actions">
          <button id="btnVerifyConsistency" class="btn-primary" style="width:100%;">Verifica Consistency</button>
        </div>
      </section>

      <section class="card col">
        <h3>2. Esito</h3>
        <div id="verifyStatus" class="status-box status-idle">In attesa di file...</div>

        <div class="info-display">
          <div class="info-row"><span class="info-label">From Size:</span><span id="resFrom" class="info-value">-</span></div>
          <div class="info-row"><span class="info-label">To Size:</span><span id="resTo" class="info-value">-</span></div>
          <div class="info-row"><span class="info-label">Old Root:</span><span id="resOldRoot" class="info-value">-</span></div>
          <div class="info-row"><span class="info-label">New Root:</span><span id="resNewRoot" class="info-value">-</span></div>
          <div class="info-row"><span class="info-label">Proof Nodes:</span><span id="resNodes" class="info-value">-</span></div>
        </div>
      </section>
    </div>

    <div class="output-container">
      <section>
        <h3>Dettagli Tecnici</h3>
        <pre id="details"><code>(nessun dato)</code></pre>
      </section>
    </div>

    <nav style="margin-top: 20px; text-align: center;">
      <a href="index.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">← Torna alla Dashboard</a>
    </nav>
  </main>

  <script type="module">
    import { el } from "./common.js";
    import { hexToBytes, bytesToHex, b64ToBytes, hashNode, equalBytes } from "./crypto.js";

    const statusEl = el("verifyStatus");
    const detailsEl = el("details");
    const modeEl = el("verifyMode");
    const checkpointInputsEl = el("checkpointInputs");
    const rootInputsEl = el("rootInputs");

    function setStatus(kind, msg) {
      statusEl.className = `status-box ${kind}`;
      statusEl.textContent = msg;
    }

    function isPowerOfTwo(n) {
      return n > 0n && (n & (n - 1n)) === 0n;
    }

    function parseCheckpoint(txt) {
      const lines = String(txt).split(/\r?\n/).map((s) => s.trim()).filter(Boolean);
      const sizeIdx = lines.findIndex((l) => /^\d+$/.test(l));
      if (sizeIdx < 0 || sizeIdx + 1 >= lines.length) {
        throw new Error("Formato checkpoint non valido");
      }

      const size = BigInt(lines[sizeIdx]);
      const root = b64ToBytes(lines[sizeIdx + 1]);
      if (root.length !== 32) throw new Error("Root hash checkpoint non valida (attesi 32 byte base64)");
      return { size, root };
    }

    // RFC6962 consistency verification.
    async function verifyConsistency(firstSize, firstRoot, secondSize, secondRoot, proofHex) {
      if (firstSize > secondSize) throw new Error("from_size > to_size");
      if (firstSize === secondSize) {
        return proofHex.length === 0 && equalBytes(firstRoot, secondRoot);
      }
      if (firstSize === 0n) return true;
      if (!proofHex.length) return false;

      const proof = proofHex.map(hexToBytes);

      let fn = firstSize - 1n;
      let sn = secondSize - 1n;
      while ((fn & 1n) === 1n) {
        fn >>= 1n;
        sn >>= 1n;
      }

      let fr, sr, idx;
      if (isPowerOfTwo(firstSize)) {
        fr = firstRoot;
        sr = firstRoot;
        idx = 0;
      } else {
        fr = proof[0];
        sr = proof[0];
        idx = 1;
      }

      for (; idx < proof.length; idx++) {
        const c = proof[idx];
        if (sn === 0n) return false;

        if ((fn & 1n) === 1n || fn === sn) {
          fr = await hashNode(c, fr);
          sr = await hashNode(c, sr);
          while (fn !== 0n && (fn & 1n) === 0n) {
            fn >>= 1n;
            sn >>= 1n;
          }
        } else {
          sr = await hashNode(sr, c);
        }

        fn >>= 1n;
        sn >>= 1n;
      }

      return sn === 0n && equalBytes(fr, firstRoot) && equalBytes(sr, secondRoot);
    }

    async function readTextFromInput(id) {
      const f = el(id).files?.[0];
      if (!f) throw new Error(`File mancante: ${id}`);
      return f.text();
    }

    async function readJsonFromInput(id) {
      const raw = await readTextFromInput(id);
      return JSON.parse(raw);
    }

    modeEl.addEventListener("change", () => {
      const mode = modeEl.value;
      checkpointInputsEl.style.display = mode === "checkpoint" ? "block" : "none";
      rootInputsEl.style.display = mode === "root" ? "block" : "none";
    });

    el("btnVerifyConsistency").addEventListener("click", async () => {
      try {
        setStatus("status-idle", "Verifica in corso...");
        detailsEl.textContent = "(calcolo...)";

        const mode = modeEl.value;
        const proofJson = await readJsonFromInput("consistencyProof");

        const from = BigInt(proofJson.from_tree_size);
        const to = BigInt(proofJson.to_tree_size);
        const proof = Array.isArray(proofJson.proof) ? proofJson.proof.map((x) => String(x).toLowerCase()) : [];

        let oldRootBytes;
        let newRootBytes;

        if (mode === "checkpoint") {
          const [oldRaw, newRaw] = await Promise.all([
            readTextFromInput("oldCheckpoint"),
            readTextFromInput("newCheckpoint"),
          ]);
          const oldCP = parseCheckpoint(oldRaw);
          const newCP = parseCheckpoint(newRaw);
          if (oldCP.size !== from) throw new Error(`Checkpoint precedente size=${oldCP.size} ma proof from=${from}`);
          if (newCP.size !== to) throw new Error(`Checkpoint successivo size=${newCP.size} ma proof to=${to}`);
          oldRootBytes = oldCP.root;
          newRootBytes = newCP.root;
        } else {
          oldRootBytes = hexToBytes(el("oldRootHex").value);
          newRootBytes = hexToBytes(el("newRootHex").value);
        }

        const ok = await verifyConsistency(from, oldRootBytes, to, newRootBytes, proof);

        el("resFrom").textContent = from.toString();
        el("resTo").textContent = to.toString();
        el("resOldRoot").textContent = bytesToHex(oldRootBytes);
        el("resNewRoot").textContent = bytesToHex(newRootBytes);
        el("resNodes").textContent = String(proof.length);

        detailsEl.textContent = JSON.stringify({
          mode,
          from_tree_size: from.toString(),
          to_tree_size: to.toString(),
          old_root_hex: bytesToHex(oldRootBytes),
          new_root_hex: bytesToHex(newRootBytes),
          proof_nodes: proof.length,
          verify_ok: ok,
        }, null, 2);

        if (ok) {
          setStatus("status-success", "✅ Consistency proof valida: il checkpoint nuovo è append-only rispetto al precedente.");
        } else {
          setStatus("status-error", "❌ Consistency proof NON valida.");
        }
      } catch (err) {
        setStatus("status-error", `Errore: ${err?.message || String(err)}`);
        detailsEl.textContent = String(err?.stack || err);
      }
    });
  </script>
</body>
</html>
